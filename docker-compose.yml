version: "3.9"

services:
  # ── Python FastAPI backend ──────────────────────────────────
  backend:
    build: ./agentic-service
    ports:
      - "8000:8000"
    env_file:
      - ./agentic-service/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js frontend ────────────────────────────────────────
  frontend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - AGENTIC_SERVICE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
